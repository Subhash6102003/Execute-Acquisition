<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Execute Acquisition</title>
</head>
<body>
  <noscript>
    <p>JavaScript is required to load the site. Open <a href="/html/index1.html">Execute Acquisition</a>.</p>
  </noscript>
  <script>
    fetch('/html/index1.html')
      .then(function(response) { return response.text(); })
      .then(function(html) {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(function() {
        window.location.replace('/html/index1.html');
      });
  </script>
</body>
</html>
